<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Multiview_6</title>

    <style>
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .video-wrapper {
            float: left;
            width: 33%;
            padding: 1px;
            box-sizing: border-box;
            margin-bottom: 10px; /* Adjust the margin to increase vertical spacing */
        }
        .text-box {
            position: relative;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 3px;
            box-sizing: border-box;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: linear-gradient(to bottom, #f2f2f2, #d9d9d9); /* Gray gradient background */
            color: black;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .video-wrapper {
                width: calc(50% - 20px);
            }
        }
    </style>

</head>
<body>

<script>
    const apiKey = 'AIzaSyD5VgaH9IPJteplU0ynPb9WvjmJPODEW0E';
    
    // 맵 객체를 활용해 비디오 ID와 엘리먼트 ID, 채널명을 매핑합니다.
    const videoConfig = {
        'VlaCnp1fxI8': { elementId: 'realTimeViewers1', name: '한국경제TV' },
        'lb1oB2feqkQ': { elementId: 'realTimeViewers2', name: 'MTN' },
        'yhpbioCP6nA': { elementId: 'realTimeViewers3', name: '연합뉴스경제' },
        's9xL1DpBsfQ': { elementId: 'realTimeViewers4', name: '매일경제TV' },
        '5cFoz90FUMk': { elementId: 'realTimeViewers5', name: '이데일리TV' },
        'w05Ejc0iOVI': { elementId: 'realTimeViewers6', name: '토마토증권통' }
    };

    // 모든 비디오 ID 리스트 추출
    const videoIds = Object.keys(videoConfig);

    function fetchAllRealTimeViewers() {
        // 6개의 ID를 쉼표로 연결 (예: id=ID1,ID2,ID3...)하여 단 한 번만 호출합니다.
        const concatenatedIds = videoIds.join(',');
        
        fetch(`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${concatenatedIds}&key=${apiKey}`)
            .then(response => response.json())
            .then(data => {
                if (!data.items) return;

                // API 응답 순서는 요청 순서와 다를 수 있으므로 id별로 매칭하여 화면을 갱신합니다.
                data.items.forEach(item => {
                    const videoId = item.id;
                    const config = videoConfig[videoId];
                    
                    if (config && item.liveStreamingDetails && item.liveStreamingDetails.concurrentViewers) {
                        const realTimeViewers = item.liveStreamingDetails.concurrentViewers;
                        const formattedViewers = addCommasToNumber(realTimeViewers);
                        document.getElementById(config.elementId).innerText = `${config.name}: ${formattedViewers}명`;
                    } else if (config) {
                        // 방송이 종료되었거나 라이브 정보가 없을 경우 예외 처리
                        document.getElementById(config.elementId).innerText = `${config.name}: 오프라인`;
                    }
                });
            })
            .catch(error => console.error('Error fetching data:', error));
    }

    function addCommasToNumber(number) {
        return number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    // 초기 로드 시 1회 일괄 요청
    fetchAllRealTimeViewers();

    // 30초마다 1회 일괄 요청 (할당량 대폭 절약)
    setInterval(() => {
        fetchAllRealTimeViewers();
    }, 15000);
</script>
